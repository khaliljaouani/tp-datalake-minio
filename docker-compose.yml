services:
  # -----------------------------------------------------------------
  # PostgreSQL : la base "catalogue" (métadonnées + lien vers MinIO)
  # -----------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: datalake-postgres
    environment:
      POSTGRES_USER: pokeuser
      POSTGRES_PASSWORD: pokepass
      POSTGRES_DB: pokedex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Les fichiers .sql ici sont exécutés automatiquement à la 1ère création
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokeuser -d pokedex"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -----------------------------------------------------------------
  # MinIO : le stockage objet (le "Data Lake" - fichiers bruts)
  # -----------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: datalake-minio
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -----------------------------------------------------------------
  # Création automatique des buckets au démarrage (Partie A)
  # -----------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: datalake-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/raw-pokemon;
      mc mb --ignore-existing local/pokemon-images;
      mc mb --ignore-existing local/reports;
      echo '✅ Buckets créés : raw-pokemon, pokemon-images, reports';
      mc ls local;
      exit 0;
      "

  # -----------------------------------------------------------------
  # n8n : l'orchestrateur du workflow (Partie C)
  # -----------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: datalake-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_SECURE_COOKIE: "false"
      N8N_USER_MANAGEMENT_DISABLED: "true"
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: Europe/Paris
      # Accès depuis n8n vers les autres services par leur nom de service :
      #   postgres:5432  /  minio:9000
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
      - minio
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  n8n_data:
    driver: local
